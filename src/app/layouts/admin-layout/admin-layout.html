<div class="flex min-h-screen bg-surface">
  <aside class="w-64 shrink-0 border-r border-outline-variant bg-white">
    <div class="flex h-16 items-center gap-2 border-b border-outline-variant px-5">
      <span class="material-symbols-rounded text-2xl text-primary">admin_panel_settings</span>
      <span class="font-bold text-primary">Admin</span>
    </div>
    <nav class="space-y-1 p-4">
      @for (item of navItems; track item.path) {
        <a
          [routerLink]="item.path"
          routerLinkActive="bg-primary-container text-primary"
          [routerLinkActiveOptions]="{ exact: item.path === '/admin' }"
          class="flex items-center gap-3 rounded-btn px-3 py-2.5 text-sm font-medium text-gray-600 hover:bg-primary-container/60"
        >
          <span class="material-symbols-rounded text-xl">{{ item.icon }}</span>
          {{ item.label }}
        </a>
      }
    </nav>
    <div class="absolute bottom-0 w-64 border-t border-outline-variant p-4">
      @if (currentUser(); as user) {
        <p class="mb-2 truncate text-xs text-gray-500">{{ user.email }}</p>
      }
      <button type="button" class="btn-outline w-full text-sm" (click)="onLogout()">Logout</button>
      <a routerLink="/" class="mt-2 block text-center text-xs text-gray-500 hover:text-primary">View public site</a>
    </div>
  </aside>
  <main class="flex-1 overflow-auto p-8">
    <router-outlet />
  </main>
</div>
