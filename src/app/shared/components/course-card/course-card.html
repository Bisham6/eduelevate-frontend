<article
  class="hover-lift animate-fade-in-up w-full min-w-0 rounded-2xl border border-outline-variant/30 bg-white transition-all duration-300 hover:-translate-y-1 hover:shadow-xl"
  [class.p-6]="!compact()"
  [class.p-4]="compact()"
  [style.animation-delay]="staggerDelay()"
>
  <div class="flex items-start justify-between gap-3">
    <div class="flex h-12 w-12 shrink-0 items-center justify-center rounded-xl bg-primary-container text-primary">
      <span class="material-symbols-rounded text-2xl">{{ course().icon }}</span>
    </div>
    <app-status-chip [label]="demandLabel()" [variant]="demandVariant()" />
  </div>

  <h3 class="mt-4 text-lg font-semibold text-primary">
    <a [routerLink]="['/courses', course().slug]" class="hover:underline">{{ course().title }}</a>
  </h3>

  <div class="mt-3 flex flex-wrap items-center gap-4 text-sm text-gray-500">
    <span class="flex items-center gap-1">
      <span class="material-symbols-rounded text-base">schedule</span>
      {{ course().duration }}
    </span>
    <span class="flex items-center gap-1">
      <span class="material-symbols-rounded text-base">payments</span>
      Avg: {{ course().avgSalary }}
    </span>
  </div>

  @if (!compact()) {
    <p class="mt-3 line-clamp-2 text-sm leading-relaxed text-gray-600">{{ course().description }}</p>

    <div class="mt-4 flex items-start gap-2 text-sm text-gray-600">
      <span class="material-symbols-rounded mt-0.5 shrink-0 text-base text-primary">trending_up</span>
      <p>
        <span class="font-medium text-primary">Career Paths:</span>
        {{ careerPathsText() }}
      </p>
    </div>
  }

  <div class="mt-6 flex min-w-0 gap-3">
    <a [routerLink]="['/courses', course().slug]" class="btn-primary min-w-0 flex-1 text-center text-sm">View Details</a>
    @if (compact()) {
      <button
        type="button"
        class="btn-outline flex h-10 w-10 shrink-0 items-center justify-center p-0"
        (click)="compare.emit(course())"
        aria-label="Compare course"
      >
        <span class="material-symbols-rounded text-lg">compare_arrows</span>
      </button>
    } @else {
      <button type="button" class="btn-outline min-w-0 flex-1 text-sm" (click)="compare.emit(course())">Compare</button>
    }
  </div>
</article>
