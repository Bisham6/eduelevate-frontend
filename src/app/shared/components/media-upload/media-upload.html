<div class="rounded-card border border-outline-variant bg-white p-4">
  <p class="text-sm font-semibold text-primary">{{ label() }}</p>
  <p class="text-xs text-gray-400">{{ hint() }}</p>

  @if (displayUrl()) {
    <div class="relative mt-3 overflow-hidden rounded-btn bg-gray-50" [class.aspect-video]="imageType() !== 'logo'" [class.h-20]="imageType() === 'logo'" [class.w-20]="imageType() === 'logo'">
      <img [src]="displayUrl()" [alt]="label()" class="h-full w-full object-cover" />
    </div>
  } @else {
    <div class="mt-3 flex h-24 items-center justify-center rounded-btn border-2 border-dashed border-outline-variant bg-gray-50">
      <span class="material-symbols-rounded text-3xl text-gray-300">image</span>
    </div>
  }

  <label class="btn-outline mt-3 inline-flex cursor-pointer items-center gap-2 text-sm">
    <span class="material-symbols-rounded text-base">upload</span>
    Choose File
    <input type="file" accept="image/jpeg,image/png,image/webp,image/svg+xml" class="hidden" (change)="onFileChange($event)" />
  </label>
</div>
