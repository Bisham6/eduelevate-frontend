@if (loader.loading()) {
  <div class="global-loader" role="status" aria-live="polite" aria-label="Loading">
    <div class="global-loader__spinner">
      <svg class="global-loader__ring" viewBox="0 0 64 64" aria-hidden="true">
        <circle class="global-loader__track" cx="32" cy="32" r="28" />
        <circle class="global-loader__arc" cx="32" cy="32" r="28" />
      </svg>
      <span class="material-symbols-rounded global-loader__icon">school</span>
    </div>
  </div>
}
