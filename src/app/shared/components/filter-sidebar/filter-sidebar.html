<aside class="rounded-card bg-white p-5 shadow-card" aria-label="Filters">
  <div class="mb-5 flex items-center justify-between">
    <h2 class="text-lg font-bold text-primary">{{ title() }}</h2>
    <button type="button" class="text-sm text-secondary hover:underline" (click)="clearAll.emit()">
      Clear All
    </button>
  </div>

  <div class="space-y-4">
    @for (section of sections(); track section.id) {
      <div class="border-b border-outline-variant pb-4 last:border-0">
        <button
          type="button"
          class="flex w-full items-center justify-between text-left"
          (click)="toggleSection(section.id)"
          [attr.aria-expanded]="isExpanded(section.id)"
        >
          <span class="text-sm font-semibold text-primary">{{ section.title }}</span>
          <span class="material-symbols-rounded text-lg text-gray-400">
            {{ isExpanded(section.id) ? 'expand_less' : 'expand_more' }}
          </span>
        </button>

        @if (isExpanded(section.id)) {
          <ul class="mt-3 space-y-2" role="list">
            @for (option of section.options; track option.value) {
              <li>
                <label class="flex cursor-pointer items-center gap-2.5 text-sm text-gray-600">
                  @if (section.type === 'checkbox') {
                    <input
                      type="checkbox"
                      class="h-4 w-4 rounded border-outline-variant text-primary focus:ring-primary/30"
                      [checked]="isSelected(section.id, option.value)"
                      (change)="onCheckboxChange(section.id, option.value, $event)"
                    />
                  } @else {
                    <input
                      type="radio"
                      [name]="section.id"
                      class="h-4 w-4 border-outline-variant text-primary focus:ring-primary/30"
                      [checked]="isSelected(section.id, option.value)"
                      (change)="onRadioChange(section.id, option.value)"
                    />
                  }
                  <span class="flex-1">{{ option.label }}</span>
                  @if (option.count !== undefined) {
                    <span class="text-xs text-gray-400">({{ option.count }})</span>
                  }
                </label>
              </li>
            }
          </ul>
        }
      </div>
    }
  </div>

  <button type="button" class="btn-primary mt-5 w-full" (click)="apply.emit()">Apply Filters</button>
</aside>
