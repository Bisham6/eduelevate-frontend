<form
  (ngSubmit)="onSubmit()"
  class="flex flex-col gap-3 rounded-card bg-white p-3 shadow-card sm:flex-row sm:items-center"
>
  <div class="relative flex-1">
    <span class="material-symbols-rounded absolute left-3 top-1/2 -translate-y-1/2 text-gray-400">search</span>
    <input
      type="search"
      [(ngModel)]="query"
      name="query"
      [placeholder]="placeholder()"
      [attr.aria-label]="ariaLabel()"
      class="h-11 w-full rounded-btn border border-outline-variant bg-white pl-10 pr-4 text-sm outline-none focus:border-primary focus:ring-2 focus:ring-primary/20"
    />
  </div>
  @if (showButton()) {
    <button type="submit" class="btn-primary h-11 shrink-0 px-8">{{ buttonLabel() }}</button>
  }
</form>
