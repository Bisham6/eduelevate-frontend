@if (showFilterNav()) {
  <nav class="bottom-nav bottom-nav--listing" aria-label="Listing controls">
    <button
      type="button"
      class="bottom-nav__filter-btn"
      [class.bottom-nav__filter-btn--active]="drawerOpen()"
      (click)="toggleFilters()"
      aria-label="Open filters"
      [attr.aria-expanded]="drawerOpen()"
    >
      <span class="material-symbols-rounded">tune</span>
      Filters
    </button>
  </nav>
} @else {
  <nav class="bottom-nav" aria-label="Mobile navigation">
    @for (tab of tabs; track tab.path) {
      <a
        [routerLink]="tab.path"
        routerLinkActive="bottom-nav__link--active"
        [routerLinkActiveOptions]="{ exact: tab.path === '/' }"
        class="bottom-nav__link"
      >
        <span class="bottom-nav__icon-wrap">
          <span class="material-symbols-rounded bottom-nav__icon">{{ tab.icon }}</span>
        </span>
        <span class="bottom-nav__label">{{ tab.label }}</span>
      </a>
    }
  </nav>
}
