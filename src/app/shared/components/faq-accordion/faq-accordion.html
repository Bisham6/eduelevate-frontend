<div class="divide-y divide-outline-variant rounded-card bg-white shadow-card">
  @for (item of items(); track item.question; let i = $index) {
    <div class="px-6 py-4">
      <button
        type="button"
        class="flex w-full items-center justify-between text-left"
        (click)="toggle(i)"
        [attr.aria-expanded]="openIndex() === i"
      >
        <span class="font-medium text-primary">{{ item.question }}</span>
        <span class="material-symbols-rounded text-gray-400">
          {{ openIndex() === i ? 'expand_less' : 'expand_more' }}
        </span>
      </button>
      @if (openIndex() === i) {
        <p class="mt-3 text-sm leading-relaxed text-gray-600">{{ item.answer }}</p>
      }
    </div>
  }
</div>
