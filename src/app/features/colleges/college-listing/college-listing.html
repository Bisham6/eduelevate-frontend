<section class="animate-fade-in-up">
  <div class="container-app section-padding">
    <app-breadcrumb [items]="breadcrumbs()" />

    <div class="mt-4">
      <app-section-header
        [title]="pageTitle()"
        [badge]="total() + ' Results found'"
      />
    </div>

    <div class="mt-8 grid gap-8 lg:grid-cols-4">
      <!-- Filter sidebar -->
      <div class="hidden lg:col-span-1 lg:block">
        <app-filter-sidebar
          [sections]="filterSections()"
          [selectedValues]="selectedFilters()"
          (valueChange)="onFilterChange($event)"
          (clearAll)="onClearFilters()"
          (apply)="onApplyFilters()"
        />
      </div>

      <!-- Results -->
      <div class="min-w-0 lg:col-span-3">
        @if (loading() && colleges().length === 0) {
          <div class="grid grid-cols-1 gap-6 md:grid-cols-2 [&_app-academic-card]:min-w-0">
            @for (i of [1,2,3,4]; track i) {
              <app-skeleton variant="card" [count]="1" />
            }
          </div>
        } @else if (error()) {
          <app-empty-state
            icon="cloud_off"
            title="Something went wrong"
            [message]="error()!"
          >
            <button type="button" class="btn-primary mt-4" (click)="loadColleges()">Retry</button>
          </app-empty-state>
        } @else if (colleges().length === 0) {
          <app-empty-state
            icon="search_off"
            title="No colleges found"
            message="Try adjusting your filters or search terms."
            actionLabel="Clear filters"
            actionLink="/colleges"
          />
        } @else {
          <div class="grid grid-cols-1 gap-6 md:grid-cols-2 [&_app-academic-card]:min-w-0">
            @for (college of colleges(); track college._id) {
              <app-academic-card [college]="college" (compare)="onCompare($event)" />
            }
          </div>

          @if (loadingMore()) {
            <div class="mt-6 grid grid-cols-1 gap-6 md:grid-cols-2 [&_app-academic-card]:min-w-0">
              @for (i of [1, 2]; track i) {
                <app-skeleton variant="card" [count]="1" />
              }
            </div>
          }

          <div
            appInfiniteScroll
            [disabled]="!hasMore() || loading() || loadingMore()"
            (loadMore)="onLoadMore()"
            class="h-px"
            aria-hidden="true"
          ></div>
        }
      </div>
    </div>
  </div>
</section>
