<section class="animate-fade-in-up">
  <div class="container-app section-padding">
    <!-- Hero -->
    <div class="mx-auto max-w-2xl text-center">
      <h1 class="text-3xl font-bold text-primary md:text-4xl">Master Your Future Goals</h1>
      <p class="mt-3 text-gray-600">
        Discover competitive entrance exams, track important dates, and access prep resources.
      </p>
      <div class="mt-6">
        <app-search-bar
          placeholder="Enter exam name"
          buttonLabel="Search"
          ariaLabel="Search exams"
          (search)="onSearch($event)"
        />
      </div>
    </div>

    <!-- Main content -->
    <div class="mt-12 grid gap-8 lg:grid-cols-4">
      <div class="lg:col-span-1">
        <app-filter-sidebar
          title="Refine Search"
          [sections]="filterSections"
          [selectedValues]="selectedFilters()"
          (valueChange)="onFilterChange($event)"
          (clearAll)="onClearFilters()"
          (apply)="onApplyFilters()"
        />
      </div>

      <div class="lg:col-span-3">
        <div class="mb-6 flex items-center justify-between">
          <app-section-header
            [title]="'Found ' + total() + ' Competitive Exams'"
            subtitle=""
          />
          <select
            class="rounded-btn border border-outline-variant bg-white px-3 py-2 text-sm outline-none focus:border-primary"
            [value]="filters().sort"
            (change)="onSortChange($event)"
          >
            <option value="exam_date_asc">Exam Date (Earliest)</option>
            <option value="exam_date_desc">Exam Date (Latest)</option>
            <option value="name_asc">Name (A-Z)</option>
          </select>
        </div>

        @if (loading()) {
          <div class="grid gap-6 md:grid-cols-2">
            @for (i of [1,2,3,4]; track i) {
              <app-skeleton variant="card" [count]="1" />
            }
          </div>
        } @else if (error()) {
          <app-empty-state icon="cloud_off" title="Something went wrong" [message]="error()!">
            <button type="button" class="btn-primary mt-4" (click)="loadExams()">Retry</button>
          </app-empty-state>
        } @else {
          <div class="grid gap-6 md:grid-cols-2">
            @for (exam of exams(); track exam._id) {
              <app-exam-card [exam]="exam" />
            }
          </div>

          <div class="mt-10">
            <app-pagination
              [total]="total()"
              [page]="filters().page ?? 1"
              [pageSize]="filters().limit ?? 8"
              (pageChange)="onPageChange($event)"
            />
          </div>
        }
      </div>
    </div>
  </div>
</section>
