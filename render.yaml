# Standalone frontend deploy (eduelevate-frontend.git)
# Set API_URL to your backend Render URL, e.g. https://collegechuniye-api.onrender.com
services:
  - type: web
    name: collegechuniye-web
    runtime: static
    plan: free
    buildCommand: npm install && npm run build:render
    staticPublishPath: ./dist/frontend/browser
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: API_URL
        sync: false
